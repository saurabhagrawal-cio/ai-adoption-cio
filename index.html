<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIO GenAI Adoption Dashboard</title>
  
  <!-- Dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, AreaChart, Area } = window.Recharts;

    function App() {
      const [rawData, setRawData] = useState([]);
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isCheckingCloud, setIsCheckingCloud] = useState(true); // New state to check cloud first
      const [error, setError] = useState(null);
      
      // Secret Admin Mode for updating data
      const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

      // Cloud Sync States
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [lastSyncTime, setLastSyncTime] = useState(null);
      const [syncError, setSyncError] = useState(null);
      const dbRef = useRef(null);
      
      // Filter States
      const [selectedRegion, setSelectedRegion] = useState('All');
      const [selectedCostCenter, setSelectedCostCenter] = useState('All');
      const [selectedTool, setSelectedTool] = useState('ANY_GENAI_TOOL_DAU');
      const [selectedDate, setSelectedDate] = useState('latest');
      const [trendGranularity, setTrendGranularity] = useState('daily');

      // --- Firebase Auth & Real-time Sync Setup ---
      useEffect(() => {
        let unsubscribeAuth;
        let unsubscribeSnapshot;

        const initFirebase = async () => {
          if (typeof __firebase_config === 'undefined') {
            setSyncError("Cloud Sync is unavailable outside the Gemini environment. Running in Local Mode.");
            setIsCheckingCloud(false);
            return;
          }

          try {
            // Use a dynamic import bypass function to prevent Babel from transpiling to `require()`
            const dynamicImport = new Function('url', 'return import(url)');
            
            const { initializeApp } = await dynamicImport('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
            const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await dynamicImport('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
            const { getFirestore, doc, setDoc, getDoc, onSnapshot } = await dynamicImport('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            dbRef.current = { db, doc, setDoc, getDoc };

            const initAuth = async () => {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await signInAnonymously(auth);
              }
            };
            await initAuth();

            unsubscribeAuth = onAuthStateChanged(auth, (u) => {
              setUser(u);
              if (u) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const metaRef = doc(db, 'artifacts', appId, 'public', 'data', 'dashboard_metadata', 'latest');
                
                unsubscribeSnapshot = onSnapshot(metaRef, async (docSnap) => {
                  if (docSnap.exists()) {
                    const meta = docSnap.data();
                    if (!meta || typeof meta.totalChunks === 'undefined') {
                      setIsCheckingCloud(false);
                      return;
                    }
                    
                    try {
                      let fullString = '';
                      for (let i = 0; i < meta.totalChunks; i++) {
                        const chunkRef = doc(db, 'artifacts', appId, 'public', 'data', 'dashboard_chunks', `chunk_${i}`);
                        const chunkSnap = await getDoc(chunkRef);
                        if (chunkSnap.exists()) {
                          fullString += chunkSnap.data().data;
                        }
                      }
                      
                      if (fullString) {
                        const parsedCompact = JSON.parse(fullString);
                        const reconstructed = parsedCompact.rows.map(rowArr => {
                           const obj = {};
                           parsedCompact.cols.forEach((col, idx) => {
                              obj[col] = rowArr[idx];
                           });
                           return obj;
                        });
                        
                        setRawData(reconstructed);
                        setIsDataLoaded(true);
                        setSyncError(null);
                        setIsCheckingCloud(false);
                        if (meta.lastUpdated) {
                          setLastSyncTime(new Date(meta.lastUpdated).toLocaleTimeString());
                        }
                      } else {
                        setIsCheckingCloud(false);
                      }
                    } catch (e) {
                      console.error("Failed to parse cloud data", e);
                      setIsCheckingCloud(false);
                    }
                  } else {
                    // No data in cloud yet
                    setIsCheckingCloud(false);
                  }
                }, (err) => {
                  console.error("Firestore listen error", err);
                  setIsCheckingCloud(false);
                });
              } else {
                setIsCheckingCloud(false);
              }
            });
          } catch (e) {
            console.error("Firebase init failed", e);
            setSyncError("Failed to initialize cloud storage.");
            setIsCheckingCloud(false);
          }
        };

        initFirebase();

        return () => {
          if (unsubscribeAuth) unsubscribeAuth();
          if (unsubscribeSnapshot) unsubscribeSnapshot();
        };
      }, []);

      // --- File Upload & Cloud Sync Handler ---
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setError(null);
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const text = event.target.result;
            const lines = text.trim().split('\n');
            if (lines.length < 2) throw new Error("The file appears to be empty.");
            
            const headers = lines[0].split(',').map(h => h.trim());
            
            if (!headers.includes('REPORT_DATE') || !headers.includes('NUMBER_OF_EMPLOYEES')) {
              throw new Error("Invalid CSV format. Ensure it contains REPORT_DATE and NUMBER_OF_EMPLOYEES columns.");
            }

            const requiredColumns = [
              'REPORT_DATE', 'REGION', 'COST_CENTER', 'NUMBER_OF_EMPLOYEES',
              'ANY_GENAI_TOOL_DAU', 'CLAUDE_CODE_DAU', 'LIBRECHAT_DAU', 
              'GITHUB_COPILOT_DAU', 'CURSOR_DAU', 'GEMINI_DAU'
            ];

            const parsed = lines.slice(1).map(line => {
              const values = line.split(',');
              const obj = {};
              headers.forEach((h, i) => {
                 if (requiredColumns.includes(h)) {
                   obj[h] = values[i] ? values[i].trim() : '';
                 }
              });
              return obj;
            }).filter(row => row.REPORT_DATE);
            
            setRawData(parsed);
            setIsDataLoaded(true);
            
            setSelectedRegion('All');
            setSelectedCostCenter('All');
            setSelectedDate('latest');

            if (user && dbRef.current && !syncError) {
              setIsSyncing(true);
              const { db, doc, setDoc } = dbRef.current;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

              try {
                const compactRows = parsed.map(row => requiredColumns.map(col => row[col] || ''));
                const compactData = { cols: requiredColumns, rows: compactRows };
                const payloadString = JSON.stringify(compactData);
                
                const CHUNK_SIZE = 800000; 
                const totalChunks = Math.ceil(payloadString.length / CHUNK_SIZE);
                
                for (let i = 0; i < totalChunks; i++) {
                  const chunkStr = payloadString.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'dashboard_chunks', `chunk_${i}`), {
                    data: chunkStr
                  });
                }
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'dashboard_metadata', 'latest'), {
                  totalChunks: totalChunks,
                  lastUpdated: Date.now(),
                  uploaderId: user.uid
                });
                
              } catch (e) {
                console.error("Cloud sync failed", e);
                setSyncError("Failed to sync to cloud. Running in Local Mode.");
              } finally {
                setIsSyncing(false);
              }
            }
            
          } catch (err) {
            console.error("Failed to parse CSV", err);
            setError(err.message || "An error occurred while parsing the file.");
          }
        };
        reader.readAsText(file);
      };

      const regions = useMemo(() => {
        const list = new Set(rawData.map(d => d.REGION).filter(Boolean));
        return ['All', ...Array.from(list).sort()];
      }, [rawData]);

      const costCenters = useMemo(() => {
        const list = new Set(rawData.map(d => d.COST_CENTER).filter(Boolean));
        return ['All', ...Array.from(list).sort()];
      }, [rawData]);

      const toolOptions = [
        { label: 'Any GenAI Tool', value: 'ANY_GENAI_TOOL_DAU' },
        { label: 'GitHub Copilot', value: 'GITHUB_COPILOT_DAU' },
        { label: 'Cursor', value: 'CURSOR_DAU' },
        { label: 'Claude Code', value: 'CLAUDE_CODE_DAU' },
        { label: 'Gemini', value: 'GEMINI_DAU' },
        { label: 'LibreChat', value: 'LIBRECHAT_DAU' },
      ];

      const filteredData = useMemo(() => {
        return rawData.filter(row => {
          const matchRegion = selectedRegion === 'All' || row.REGION === selectedRegion;
          const matchCC = selectedCostCenter === 'All' || row.COST_CENTER === selectedCostCenter;
          return matchRegion && matchCC;
        });
      }, [rawData, selectedRegion, selectedCostCenter]);

      const timeSeriesData = useMemo(() => {
        const dailyMap = {};
        filteredData.forEach(row => {
          const date = row.REPORT_DATE;
          if (!date) return;
          if (!dailyMap[date]) {
            dailyMap[date] = { date, employees: 0, activeUsers: 0 };
          }
          dailyMap[date].employees += Number(row.NUMBER_OF_EMPLOYEES || 0);
          dailyMap[date].activeUsers += Number(row[selectedTool] || 0);
        });

        const dailyArr = Object.values(dailyMap).sort((a, b) => a.date.localeCompare(b.date));

        if (trendGranularity === 'daily') {
          return dailyArr.map(d => ({
            ...d,
            label: d.date,
            adoptionRate: d.employees > 0 ? ((d.activeUsers / d.employees) * 100).toFixed(1) : 0
          }));
        } else {
          const weeklyMap = {};
          dailyArr.forEach(d => {
            const [year, month, day] = d.date.split('-');
            const dateObj = new Date(year, month - 1, day);
            const dayOfWeek = dateObj.getDay();
            const diff = dateObj.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            dateObj.setDate(diff);
            
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            const weekStartStr = `${yyyy}-${mm}-${dd}`;

            if (!weeklyMap[weekStartStr]) {
              weeklyMap[weekStartStr] = { date: weekStartStr, empSum: 0, auSum: 0, count: 0 };
            }
            weeklyMap[weekStartStr].empSum += d.employees;
            weeklyMap[weekStartStr].auSum += d.activeUsers;
            weeklyMap[weekStartStr].count += 1;
          });

          return Object.values(weeklyMap)
            .sort((a, b) => a.date.localeCompare(b.date))
            .map(w => {
               const avgEmp = Math.round(w.empSum / w.count);
               const avgAu = Math.round(w.auSum / w.count);
               return {
                 date: w.date,
                 label: `Wk of ${w.date}`,
                 employees: avgEmp,
                 activeUsers: avgAu,
                 adoptionRate: avgEmp > 0 ? ((avgAu / avgEmp) * 100).toFixed(1) : 0
               };
            });
        }
      }, [filteredData, selectedTool, trendGranularity]);

      const absoluteLatestDate = useMemo(() => {
        if (filteredData.length === 0) return '-';
        return filteredData.reduce((max, row) => row.REPORT_DATE > max ? row.REPORT_DATE : max, filteredData[0].REPORT_DATE);
      }, [filteredData]);

      const availableDates = useMemo(() => {
        if (filteredData.length === 0) return [];
        return [...new Set(filteredData.map(d => d.REPORT_DATE).filter(Boolean))].sort((a,b) => b.localeCompare(a));
      }, [filteredData]);

      const effectiveDate = selectedDate === 'latest' ? absoluteLatestDate : selectedDate;

      const snapshotStats = useMemo(() => {
        if (filteredData.length === 0) return { employees: 0, activeUsers: 0, adoptionRate: 0, date: '-' };
        const latestData = filteredData.filter(d => d.REPORT_DATE === effectiveDate);
        
        let employees = 0;
        let activeUsers = 0;
        latestData.forEach(row => {
           employees += Number(row.NUMBER_OF_EMPLOYEES || 0);
           activeUsers += Number(row[selectedTool] || 0);
        });
        
        return {
           date: effectiveDate,
           employees,
           activeUsers,
           adoptionRate: employees > 0 ? ((activeUsers / employees) * 100).toFixed(1) : 0
        };
      }, [filteredData, effectiveDate, selectedTool]);

      const toolBreakdownData = useMemo(() => {
        if (filteredData.length === 0) return [];
        const latestData = filteredData.filter(d => d.REPORT_DATE === effectiveDate);
        
        let copilot = 0, cursor = 0, claude = 0, gemini = 0, librechat = 0;
        
        latestData.forEach(row => {
          copilot += Number(row.GITHUB_COPILOT_DAU || 0);
          cursor += Number(row.CURSOR_DAU || 0);
          claude += Number(row.CLAUDE_CODE_DAU || 0);
          gemini += Number(row.GEMINI_DAU || 0);
          librechat += Number(row.LIBRECHAT_DAU || 0);
        });

        return [
          { name: 'GitHub Copilot', users: copilot },
          { name: 'Cursor', users: cursor },
          { name: 'Claude Code', users: claude },
          { name: 'Gemini', users: gemini },
          { name: 'LibreChat', users: librechat },
        ].sort((a, b) => b.users - a.users);
      }, [filteredData, effectiveDate]);

      const generateDimensionData = (dimension) => {
        if (filteredData.length === 0) return [];
        const latestData = filteredData.filter(d => d.REPORT_DATE === effectiveDate);
        
        const aggregated = {};
        latestData.forEach(row => {
          const dimValue = row[dimension] || 'Unknown';
          if (!aggregated[dimValue]) aggregated[dimValue] = 0;
          aggregated[dimValue] += Number(row[selectedTool] || 0);
        });

        return Object.keys(aggregated)
          .map(key => ({ name: key, users: aggregated[key] }))
          .sort((a, b) => b.users - a.users);
      };

      const regionBreakdown = useMemo(() => generateDimensionData('REGION'), [filteredData, effectiveDate, selectedTool]);
      const costCenterBreakdown = useMemo(() => generateDimensionData('COST_CENTER'), [filteredData, effectiveDate, selectedTool]);

      // --- INITIAL LOADING STATE ---
      if (isCheckingCloud) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-sans">
            <div className="text-center p-8 bg-white rounded-xl shadow-sm border border-slate-200 max-w-md w-full space-y-4">
              <div className="flex items-center justify-center text-indigo-600">
                <svg className="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </div>
              <h2 className="text-lg font-bold text-slate-800">Connecting to Secure Cloud...</h2>
            </div>
          </div>
        );
      }

      // --- EMPTY STATE (FILE UPLOAD SCREEN - ONLY SHOWN IF CLOUD IS EMPTY) ---
      if (!isDataLoaded) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-sans">
            <div className="text-center p-8 bg-white rounded-xl shadow-sm border border-slate-200 max-w-md w-full space-y-6">
               <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto">
                 <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
               </div>
               <div>
                 <h2 className="text-2xl font-bold text-slate-900">Dashboard Setup</h2>
                 <p className="text-slate-500 mt-2 text-sm leading-relaxed">
                   The cloud database is currently empty. Please upload the initial <b>Data.csv</b> file to populate the dashboard.
                 </p>
               </div>

               {error && (
                 <div className="bg-red-50 text-red-600 text-sm p-3 rounded-lg flex items-start gap-2 text-left">
                   <span>⚠️</span>
                   <span>{error}</span>
                 </div>
               )}

               <label className="flex items-center justify-center w-full bg-indigo-600 text-white py-3 px-4 rounded-xl font-medium cursor-pointer hover:bg-indigo-700 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Select CSV File & Sync
                  <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
               </label>
            </div>
          </div>
        );
      }

      // --- MAIN DASHBOARD VIEW ---
      return (
        <div className="min-h-screen p-4 md:p-8 pb-24 max-w-7xl mx-auto">
          
          <div className="mb-6 space-y-6">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <div>
                <h1 className="text-3xl font-bold text-slate-900 tracking-tight">CIO Org GenAI Adoption</h1>
                <p className="text-slate-500 mt-1">Standalone Executive Dashboard</p>
              </div>
              
              <div className="flex items-center space-x-3 bg-white p-2 rounded-lg shadow-sm border border-slate-200">
                {syncError ? (
                  <div className="flex items-center text-xs text-amber-600 font-medium px-2" title={syncError}>
                    ⚠️ Local Mode
                  </div>
                ) : isSyncing ? (
                  <div className="flex items-center text-xs text-indigo-500 font-medium px-2">
                    <span className="animate-spin mr-1">⌛</span> Syncing...
                  </div>
                ) : lastSyncTime ? (
                  <div className="flex items-center text-xs text-emerald-600 font-medium px-2" title="Live synced across devices">
                    ☁️ Live Shared
                  </div>
                ) : null}
                
                {/* Only show the Upload button if user adds ?admin=true to the URL */}
                {isAdmin && (
                  <React.Fragment>
                    <div className="w-px h-4 bg-slate-200 hidden sm:block"></div>
                    <label className="text-sm font-medium text-slate-600 cursor-pointer hover:text-indigo-600 transition-colors flex items-center gap-2 px-2 border border-slate-200 bg-slate-50 rounded p-1">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                      Admin Update CSV
                      <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                    </label>
                  </React.Fragment>
                )}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
              <div className="space-y-1">
                <div className="flex justify-between items-center">
                  <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-1">
                     📅 Snapshot Date
                  </label>
                  {selectedDate !== 'latest' && (
                    <button 
                      onClick={() => setSelectedDate('latest')}
                      className="text-[10px] text-indigo-700 hover:text-indigo-900 font-bold bg-indigo-50 hover:bg-indigo-100 px-2 py-0.5 rounded-full transition-colors"
                      title="Reset to the most recent date"
                    >
                      Use Latest
                    </button>
                  )}
                </div>
                <input 
                  type="date"
                  className="w-full bg-slate-50 border border-slate-200 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                  value={effectiveDate}
                  min={availableDates.length > 0 ? availableDates[availableDates.length - 1] : ''}
                  max={absoluteLatestDate !== '-' ? absoluteLatestDate : ''}
                  onChange={(e) => { 
                    if (e.target.value) {
                      setSelectedDate(e.target.value); 
                    }
                  }}
                />
              </div>

              <div className="space-y-1">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-1">
                   🔎 Tool
                </label>
                <select 
                  className="w-full bg-slate-50 border border-slate-200 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                  value={selectedTool}
                  onChange={(e) => setSelectedTool(e.target.value)}
                >
                  {toolOptions.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
              </div>

              <div className="space-y-1">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Region</label>
                <select 
                  className="w-full bg-slate-50 border border-slate-200 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                  value={selectedRegion}
                  onChange={(e) => setSelectedRegion(e.target.value)}
                >
                  {regions.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>

              <div className="space-y-1">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Cost Center</label>
                <select 
                  className="w-full bg-slate-50 border border-slate-200 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                  value={selectedCostCenter}
                  onChange={(e) => setSelectedCostCenter(e.target.value)}
                >
                  {costCenters.map(cc => <option key={cc} value={cc}>{cc}</option>)}
                </select>
              </div>
            </div>
          </div>

          <div className="space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4 overflow-hidden">
                <div className="bg-emerald-100 p-3 rounded-lg text-2xl shrink-0">📈</div>
                <div className="min-w-0">
                  <p className="text-sm font-medium text-slate-500">Daily Active Users</p>
                  <h3 className="text-2xl font-bold text-slate-900 truncate">{snapshotStats.activeUsers.toLocaleString()}</h3>
                  <p className="text-xs text-slate-400 mt-1 truncate">{toolOptions.find(t=>t.value===selectedTool)?.label}</p>
                </div>
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4 overflow-hidden">
                <div className="bg-indigo-100 p-3 rounded-lg text-2xl shrink-0">🌍</div>
                <div className="min-w-0">
                  <p className="text-sm font-medium text-slate-500">Top Region</p>
                  <h3 className="text-2xl font-bold text-slate-900 truncate" title={regionBreakdown.length > 0 ? regionBreakdown[0].name : '-'}>
                    {regionBreakdown.length > 0 ? regionBreakdown[0].name : '-'}
                  </h3>
                  <p className="text-xs text-slate-400 mt-1 truncate">{regionBreakdown.length > 0 ? regionBreakdown[0].users.toLocaleString() + ' active users' : 'No data'}</p>
                </div>
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4 overflow-hidden">
                <div className="bg-amber-100 p-3 rounded-lg text-2xl shrink-0">🏢</div>
                <div className="min-w-0">
                  <p className="text-sm font-medium text-slate-500">Top Cost Center</p>
                  <h3 className="text-2xl font-bold text-slate-900 truncate" title={costCenterBreakdown.length > 0 ? costCenterBreakdown[0].name : '-'}>
                    {costCenterBreakdown.length > 0 ? costCenterBreakdown[0].name : '-'}
                  </h3>
                  <p className="text-xs text-slate-400 mt-1 truncate">{costCenterBreakdown.length > 0 ? costCenterBreakdown[0].users.toLocaleString() + ' active users' : 'No data'}</p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 lg:col-span-2 flex flex-col">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                  <h3 className="text-lg font-bold text-slate-800">Adoption Trend (DAU over Time)</h3>
                  <div className="flex bg-slate-100 p-1 rounded-lg">
                    <button 
                      onClick={() => setTrendGranularity('daily')}
                      className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${trendGranularity === 'daily' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      Daily
                    </button>
                    <button 
                      onClick={() => setTrendGranularity('weekly')}
                      className={`px-3 py-1 text-xs font-medium rounded-md transition-colors ${trendGranularity === 'weekly' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      Weekly
                    </button>
                  </div>
                </div>
                
                <div className="h-72 w-full flex-grow">
                  <ResponsiveContainer width="100%" height="100%">
                    <AreaChart data={timeSeriesData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                      <defs>
                        <linearGradient id="colorUsers" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#6366f1" stopOpacity={0.3}/>
                          <stop offset="95%" stopColor="#6366f1" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                      <XAxis dataKey="label" tick={{fontSize: 12, fill: '#64748b'}} tickMargin={10} minTickGap={30} />
                      <YAxis tick={{fontSize: 12, fill: '#64748b'}} />
                      <RechartsTooltip 
                        contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                        labelStyle={{ fontWeight: 'bold', color: '#334155', marginBottom: '4px' }}
                      />
                      <Area type="monotone" dataKey="activeUsers" stroke="#6366f1" strokeWidth={3} fillOpacity={1} fill="url(#colorUsers)" name="Active Users" />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <div className="flex flex-col gap-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex-1">
                  <h3 className="text-lg font-bold text-slate-800 mb-4">Users by Tool</h3>
                  <div className="h-48">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={toolBreakdownData} layout="vertical" margin={{ top: 0, right: 20, left: 10, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#f1f5f9" />
                        <XAxis type="number" hide />
                        <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 12, fill: '#475569'}} width={100} />
                        <RechartsTooltip cursor={{fill: '#f8fafc'}} contentStyle={{ borderRadius: '8px' }} />
                        <Bar dataKey="users" fill="#10b981" radius={[0, 4, 4, 0]} barSize={20} name="Active Users" />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
                
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex-1">
                  <h3 className="text-lg font-bold text-slate-800 mb-4">Adoption by Region</h3>
                  <div className="h-48">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={regionBreakdown} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="name" tick={{fontSize: 12, fill: '#64748b'}} tickLine={false} axisLine={false} tickMargin={10} />
                        <YAxis tick={{fontSize: 12, fill: '#64748b'}} tickLine={false} axisLine={false} />
                        <RechartsTooltip cursor={{fill: '#f8fafc'}} contentStyle={{ borderRadius: '8px' }} />
                        <Bar dataKey="users" fill="#3b82f6" radius={[4, 4, 0, 0]} maxBarSize={40} name="Active Users" />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 lg:col-span-3">
                <h3 className="text-lg font-bold text-slate-800 mb-4">Adoption by Cost Center</h3>
                <div className="h-64">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={costCenterBreakdown} layout="vertical" margin={{ top: 0, right: 20, left: 20, bottom: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#f1f5f9" />
                      <XAxis type="number" hide />
                      <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 12, fill: '#475569'}} width={250} />
                      <RechartsTooltip cursor={{fill: '#f8fafc'}} contentStyle={{ borderRadius: '8px' }} />
                      <Bar dataKey="users" fill="#f59e0b" radius={[0, 4, 4, 0]} barSize={20} name="Active Users" />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
